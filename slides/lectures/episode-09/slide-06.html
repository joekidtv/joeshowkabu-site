<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;}
*{box-sizing:border-box;}
.slide{width:1080px;height:1350px;background:#FFFFFF;border-left:16px solid #FF3333;border-right:16px solid #33CC66;
  font-family:'Noto Sans JP',sans-serif;position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:44px;padding:60px 70px;}
.box{border:4px solid #000000;box-shadow:8px 8px 0 #000000;background:#FFFFFF;}
.badge{padding:14px 36px;font-size:32px;font-weight:900;}
.title{padding:40px 56px;font-size:72px;font-weight:900;letter-spacing:-0.02em;text-align:center;line-height:1.3;}
.subtitle{font-size:36px;font-weight:700;text-align:center;max-width:820px;line-height:1.6;}
.body-text{font-size:36px;font-weight:700;text-align:center;max-width:820px;line-height:1.7;}
.char{width:340px;height:340px;display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:700;text-align:center;padding:20px;}
.char-row{display:flex;gap:40px;align-items:center;justify-content:center;}
.char-label{font-size:26px;font-weight:900;margin-top:16px;text-align:center;}
.list{display:flex;flex-direction:column;gap:28px;align-items:flex-start;}
.list-item{font-size:34px;font-weight:700;line-height:1.5;display:flex;gap:16px;align-items:flex-start;}
.list-num{background:#000;color:#fff;border-radius:0;width:44px;height:44px;min-width:44px;
  display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;}
.footer{position:absolute;bottom:0;left:16px;right:16px;background:#4682B4;color:#FFFFFF;
  font-size:22px;font-weight:700;text-align:center;padding:18px 24px;border-top:4px solid #000000;
  line-height:1.5;}
</style></head><body>
<div class="slide">
  <div class="box title" style="font-size:64px;">デッドクロス<br>とは</div>
  <div class="body-text">短期線が長期線を上から下に抜ける形。下落のサインとされることがありますが、絶対ではありません。</div>
  <div class="char-row">
    <div class="box char" style="border-color:#FF3333;">デッドクロス<br>画像</div>
  </div>
  <div class="footer">@joeshowkabu&nbsp;&nbsp;06/9</div>
</div></body></html>
