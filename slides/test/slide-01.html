<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">

.body{font-size:36px;font-weight:700;max-width:760px;text-align:center;line-height:1.6;}
.footer{position:absolute;bottom:0;left:16px;right:16px;background:#4682B4;color:#FFF;font-size:22px;font-weight:700;text-align:center;padding:20px 0;border-top:4px solid #000;}

</div></body></html>
